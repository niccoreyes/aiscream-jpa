# source of template 
# https://github.com/hapifhir/hapi-fhir-jpaserver-starter/blob/master/src/main/resources/application.yaml
# This resource also includes all available configurations and settings
spring:
  datasource:
    url: 'jdbc:postgresql://db:5432/hapi'
    username: admin
    password: admin
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: true
      hibernate.search.backend.type: lucene
      hibernate.search.backend.analysis.configurer: ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurers$HapiLuceneAnalysisConfigurer
      hibernate.search.backend.directory.type: local-filesystem
      hibernate.search.backend.directory.root: /app/target/lucene_indexes
      hibernate.search.schema_management.strategy: CREATE

hapi:
  fhir:
    validate_resource_status_for_package_upload: false

    enable_repository_validating_interceptor: true

    enforce_referential_integrity_on_write: true

    validation:
      # requests_enabled MUST remain false. The RequestValidatingInterceptor
      # (old-style IServerInterceptor) fires at SERVER_INCOMING_REQUEST_POST_PROCESSED,
      # which HAPI invokes BEFORE @Hook(SERVER_INCOMING_REQUEST_PRE_HANDLED) — the
      # pointcut used by PhCoreDeduplicationInterceptor. Enabling this would validate
      # the pre-merge (stale) incoming resource before dedup runs, breaking the flow.
      # The $validate FHIR operation endpoint is always available and not gated here.
      requests_enabled: false
      responses_enabled: true

    implementationguides:
      ph_core:
        name: fhir.ph.core
        version: 0.2.0
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        packageUrl: https://build.fhir.org/ig/UP-Manila-SILab/ph-core/package.tgz
        fetchDependencies: true
        installResourceTypes:
          - StructureDefinition
          - SearchParameter
          - NamingSystem
          - Subscription
        dependencyExcludes:
           - "hl7.fhir.uv.extensions"
           - "hl7.fhir.uv.extensions.r4"
           - "hl7.terminology.r5"
      ph_eref:
        name: fhir.ph.ereferral
        version: 0.1.0
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        packageUrl: https://build.fhir.org/ig/ph-ereferral-organization/ph-ereferral/package.tgz
        fetchDependencies: true
        installResourceTypes:
          - StructureDefinition
          - SearchParameter
          - NamingSystem
          - Subscription
        dependencyExcludes:
           - "hl7.fhir.uv.extensions"
           - "hl7.fhir.uv.extensions.r4"
           - "hl7.terminology.r5"
           - "fhir.ph.core"
      hl7_extensions_r4:
        name: hl7.fhir.uv.extensions.r4
        version: 5.3.0
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        fetchDependencies: true
        installResourceTypes:
          - StructureDefinition
          - SearchParameter
        dependencyExcludes:
           - "hl7.terminology.r5"
           - "hl7.terminology.r4"
    logical_urls:
      - http://terminology.hl7.org/*
      - https://terminology.hl7.org/*
      - http://snomed.info/*
      - https://snomed.info/*
      - http://unitsofmeasure.org/*
      - https://unitsofmeasure.org/*
      - http://loinc.org/*
      - https://loinc.org/*
      - https://psa.gov.ph/*
      - https://fhir.doh.gov.ph/*
    custom-bean-packages: ph.phcore.interceptor
    custom-interceptor-classes:
      - ph.phcore.interceptor.PhCoreDeduplicationInterceptor

    remote_terminology_service:
      all:
        system: '*'
        url: 'https://tx.fhirlab.net/fhir'