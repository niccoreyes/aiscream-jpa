# source of template 
# https://github.com/hapifhir/hapi-fhir-jpaserver-starter/blob/master/src/main/resources/application.yaml
# This resource also includes all available configurations and settings
spring:
  datasource:
    url: 'jdbc:postgresql://db:5432/hapi'
    username: admin
    password: admin
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: true
      hibernate.search.backend.type: lucene
      hibernate.search.backend.directory.type: local-filesystem
      hibernate.search.backend.directory.root: /tmp/lucene
      hibernate.search.backend.analysis.configurer: ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurers$HapiLuceneAnalysisConfigurer

hapi:
  fhir:
    validate_resource_status_for_package_upload: false
    implementationguides:
      ph_core:
        name: fhir.ph.core
        version: 0.2.0
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        packageUrl: https://build.fhir.org/ig/UP-Manila-SILab/ph-core/package.tgz
        fetchDependencies: true
        dependencyExcludes:
           - "hl7.fhir.uv.extensions"
           - "hl7.fhir.uv.extensions.r4"
           - "hl7.terminology.r5"
           - "hl7.fhir.uv.tools.r4"
      ph_eref:
        name: fhir.ph.ereferral
        version: 0.1.0
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        packageUrl: https://build.fhir.org/ig/ph-ereferral-organization/ph-ereferral/package.tgz
        fetchDependencies: true
        dependencyExcludes:
           - "hl7.fhir.uv.extensions"
           - "hl7.fhir.uv.extensions.r4"
           - "hl7.terminology.r5"
           - "hl7.fhir.uv.tools.r4"
           - "fhir.ph.core"
    term:
      pre_expand_value_sets: true
      pre_expand_value_sets_interval: 300000
    logical_urls:
      - http://snomed.info/*
      - https://snomed.info/*
      - http://unitsofmeasure.org/*
      - https://unitsofmeasure.org/*
      - http://loinc.org/*
      - https://loinc.org/*
    remote_terminology_service:
      snomed:
        system: 'http://snomed.info/sct'
        url: 'https://tx.fhirlab.net/fhir'
      loinc:
        system: 'http://loinc.org'
        url: 'https://tx.fhirlab.net/fhir'
      rxnorm:
        system: 'http://www.nlm.nih.gov/research/umls/rxnorm'
        url: 'https://tx.fhirlab.net/fhir'